spring.application.name=jobapp

# --------------------
# MySQL (defaults para correr sin Docker)
# --------------------
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/jobapp_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:jobapp}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:jobapp}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=${SPRING_JPA_DDL_AUTO:update}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=${SPRING_JPA_FORMAT_SQL:false}

# --------------------
# Redis (cache)
# --------------------
spring.cache.type=${SPRING_CACHE_TYPE:redis}
spring.data.redis.host=${SPRING_REDIS_HOST:localhost}
spring.data.redis.port=${SPRING_REDIS_PORT:6379}
spring.data.redis.password=${SPRING_REDIS_PASSWORD:}
spring.data.redis.timeout=${SPRING_REDIS_TIMEOUT:60000}

# --------------------
# Mongo (si lo usás)
# --------------------
spring.data.mongodb.uri=${SPRING_DATA_MONGODB_URI:mongodb://localhost:27017/jobapp_mongo}

# --------------------
# External services (si aplica)
# --------------------
note.service.base-url=${NOTE_SERVICE_URL:http://localhost:8082/notes}

# --------------------
# App custom
# --------------------
jobapp.reject.threshold.days=30

spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

# Errores (base conservadora)
server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=never

# Logging base
logging.level.com.mtripode.jobapp=INFO
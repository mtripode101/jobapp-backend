services:
  kafka:
    image: apache/kafka:latest
    container_name: jobapp-kafka-dev
    restart: unless-stopped
    ports:
      - "9094:9092"
    environment:
      - KAFKA_NODE_ID=1
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://jobapp-kafka-dev:9092
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@jobapp-kafka-dev:9093
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1
      - KAFKA_AUTO_CREATE_TOPICS_ENABLE=true
      - KAFKA_LOG_DIRS=/var/lib/kafka/data
    volumes:
      - kafka_data_dev:/var/lib/kafka/data
    networks:
      - jobapp-net

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: jobapp-kafka-ui-dev
    restart: unless-stopped
    depends_on:
      - kafka
    ports:
      - "8086:8080"
    environment:
      - KAFKA_CLUSTERS_0_NAME=jobapp-dev
      - KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS=jobapp-kafka-dev:9092
    networks:
      - jobapp-net

volumes:
  kafka_data_dev:
    name: jobapp-dev-kafka_data

networks:
  jobapp-net:
    external: true
